<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <style> 
        body, html {
            height: 100%;
            margin: 0;
        }
        .bg-copa {
            background-image: url(FIFA-World-Cup-26.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            
        }
    </style>
</head>
<body>

    <div class="bg-copa">
        <div class="d-flex flex-column align-items-center">       
            <div class="card" style="width: 22rem;" aria-hidden="true">
            <img src="img_.svg" class="card-img-top" alt="Placeholder Copa" width="800px">
            
                <div class="card-body"> 
                    <h5 id="Nome" class="card-title placeholder-glow">
                        <span class="placeholder col-6"></span>
                        <span id="Rank" class="badge text-bg-secondary">-</span>
                    </h5>
                    <p class="card-text placeholder-glow">
                        <span id="Data_Nas" class="placeholder col-4"></span><br>
                        <span id="Alutra" class="placeholder col-4"></span><br>
                        <span id="Posição " class="placeholder col-6"></span><br>
                    </p>

                
                </div>
            </div>
                <a href="#" onclick="revelar()" tabindex="-1" class="btn btn-primary" style="margin: 10px; padding: 10px;">
                 Revelar 
                </a>
        </div>
    </div>

    <script src="js\bootstrap.js"></script>
    <script src="script.js"></script>
    <script>
    function revelar() {

   
    const img = document.querySelector(".card-img-top");
    img.src = "_vinicius_junior.png";

    document.getElementById("Nome").childNodes[0].nodeValue = "Vinícius José Paixão de Oliveira Júnior ";
    document.getElementById("Rank").textContent = "9,5";

    document.getElementById("Data_Nas").textContent = "12/07/2000 (25 anos)";
    document.getElementById("Alutra").textContent = "1,76 m";
    document.getElementById("Posição ").textContent = "Ponta-esquerda / Atacante";

    const placeholders = document.querySelectorAll(".placeholder");

    placeholders.forEach(el => {
        el.classList.remove("placeholder");
        el.classList.add("card-text");
    });
}
</script>
</body>
</html>
